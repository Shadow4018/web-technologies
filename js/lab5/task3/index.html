<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Дата та час</title>
</head>
<body>

    <h2>Годинник</h2>
    <p id="clock">00:00:00</p>

    <hr>

    <h2>Таймер зворотного відліку</h2>
    <input type="datetime-local" id="timer-target">
    <button onclick="startCustomCountdown()">Старт</button>
    <p id="timer-output"></p>

    <hr>

    <h2>До дня народження</h2>
    <input type="date" id="bday-input">
    <button onclick="calculateBirthday()">Старт</button>
    <p id="bday-output"></p>

    <a href="https://youtu.be/dQw4w9WgXcQ?si=6qqqGUkjOtWEiVGL" target="_blank">Тиць сюди</a>

    <script src="script.js"></script>
</body>
</html>
